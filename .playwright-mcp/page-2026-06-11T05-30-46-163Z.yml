      - heading "Manufacturing maintenance, automated." [level=2] [ref=e53]
      - paragraph [ref=e54]: Large custom wood flooring manufacturer — Southern California
    - generic [ref=e57]:
      - paragraph [ref=e59]: Scroll down
      - generic [ref=e60]:
        - generic [ref=e64]:
          - heading "The Problem" [level=3] [ref=e65]
          - paragraph [ref=e66]: Maintenance technicians were digging through paper manuals and spreadsheets to log machine statuses. Critical context lived in different places, and routine work depended on whoever remembered what.
        - generic [ref=e70]:
          - heading "The Solution" [level=3] [ref=e71]
          - paragraph [ref=e72]: A Discord-based AI agent that indexes every machine manual via Onyx, connects to ClickUp for task management, and lets technicians ask questions, log statuses, and manage preventive maintenance — all in one conversation.
        - generic [ref=e76]:
          - heading "The Result" [level=3] [ref=e77]
          - paragraph [ref=e78]: Technicians get sourced answers in seconds instead of digging through paper binders. Preventive maintenance tasks get logged, tracked, and surfaced automatically — no more chasing down clipboards. Maintenance runs on a system, not memory.
      - paragraph [ref=e80]: So cool, right?
